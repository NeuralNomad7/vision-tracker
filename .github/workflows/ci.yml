name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: flake8 vision_tracker.py

      - name: Smoke test — module import
        run: python -c "import vision_tracker; print(f'v{vision_tracker.__version__} OK')"

      - name: Smoke test — CLI help
        run: python vision_tracker.py --help

      - name: Smoke test — list serial ports
        run: python vision_tracker.py --list-ports
